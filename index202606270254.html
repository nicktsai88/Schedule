<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🏆 決戰會考 國二升國三暑假衝刺計畫</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;700;900&display=swap');
        body {
            font-family: 'Noto Sans TC', sans-serif;
            background-color: #f3f4f6;
        }
        .hide-scrollbar::-webkit-scrollbar {
            display: none;
        }
        .hide-scrollbar {
            -ms-overflow-style: none;
            scrollbar-width: none;
        }
        /* 今日專屬發光外框動畫 */
        .glow-today {
            box-shadow: 0 0 20px 5px rgba(250, 204, 21, 0.6);
            border-color: #facc15 !important;
            transform: scale(1.02);
            z-index: 10;
        }
        /* 打勾後的視覺變化 */
        .task-completed {
            opacity: 0.6;
            text-decoration: line-through;
            background-color: #f9fafb !important;
            border-color: #e5e7eb !important;
            color: #9ca3af !important;
        }
        /* 自定義彈出視窗動畫 */
        .modal-enter-active, .modal-leave-active {
            transition: all 0.3s ease;
        }
        .modal-enter-from, .modal-leave-to {
            opacity: 0;
            transform: scale(0.95);
        }
    </style>
</head>
<body class="text-gray-800 antialiased">

<div id="app" class="min-h-screen pb-12" v-cloak>
    <!-- Header (含登入功能) -->
    <header class="bg-gradient-to-r from-blue-600 to-indigo-700 text-white shadow-lg sticky top-0 z-40">
        <div class="w-full px-4 md:px-6 py-4 flex flex-col md:flex-row justify-between items-center gap-4">
            <div>
                <h1 class="text-2xl font-black tracking-wider flex items-center">
                    <i class="fas fa-trophy text-yellow-400 mr-2"></i>決戰會考 暑假衝刺計畫
                </h1>
                <p class="text-blue-100 text-sm mt-1">執行期間：5/25 ～ 8/30 | <i class="fas fa-cloud text-blue-200 mx-1"></i> 進度自動雲端儲存</p>
            </div>
            
            <!-- 使用者登入區塊 -->
            <div class="bg-white/10 p-2 px-4 rounded-xl backdrop-blur-sm border border-white/20 flex flex-col justify-center items-center gap-2">
                <div v-if="!isLoggedIn" class="w-full flex flex-col items-center gap-2">
                    <div class="flex flex-col md:flex-row items-center gap-3 w-full justify-center">
                        <div class="flex items-center gap-2">
                            <i class="fas fa-user-circle text-xl text-yellow-300"></i>
                            <input v-model="userNameInput" @keyup.enter="login" type="text" placeholder="輸入姓名登入" class="px-3 py-1.5 text-sm text-gray-800 rounded outline-none w-32 md:w-40 focus:ring-2 focus:ring-yellow-400 font-bold transition-all">
                        </div>
                        <button @click="login" :disabled="isLoggingIn || !isFirebaseReady || !userNameInput.trim()" 
                                class="px-4 py-1.5 rounded font-bold text-sm shadow transition-all duration-300 whitespace-nowrap"
                                :class="(userNameInput.trim() && isFirebaseReady && !isLoggingIn) ? 'bg-yellow-400 hover:bg-yellow-300 text-yellow-900 shadow-[0_0_15px_rgba(250,204,21,0.6)] scale-105' : 'bg-white/20 text-white/50 border border-white/20 cursor-not-allowed'">
                            <span v-if="isLoggingIn"><i class="fas fa-spinner fa-spin mr-1"></i>連線中</span>
                            <span v-else><i class="fas fa-sign-in-alt mr-1"></i>登入存檔</span>
                        </button>
                    </div>

                    <div v-if="historicalUsers.length > 0" class="flex flex-wrap items-center justify-center gap-2 mt-1 pt-2 border-t border-white/10 w-full">
                        <span class="text-white/80 text-xs font-bold"><i class="fas fa-bolt text-yellow-400 mr-1"></i>快速登入:</span>
                        <button v-for="user in historicalUsers" :key="user" @click="quickLogin(user)" 
                                class="text-xs bg-white/20 hover:bg-white/40 text-white px-3 py-1 rounded-full transition-colors border border-white/30 shadow-sm">
                            {{ user }}
                        </button>
                    </div>
                </div>
                <div v-else class="flex items-center gap-3">
                    <div class="flex items-center gap-2 bg-yellow-400 text-yellow-900 px-3 py-1 rounded-full shadow-inner font-bold text-sm">
                        <i class="fas fa-check-circle text-green-700"></i>
                        <span>{{ currentUser }}</span>
                    </div>
                    <button @click="logout" class="bg-indigo-500 hover:bg-indigo-400 text-white px-3 py-1.5 rounded font-bold text-xs shadow transition-colors whitespace-nowrap border border-indigo-400">
                        登出
                    </button>
                </div>
            </div>
        </div>
    </header>

    <!-- Main Content -->
    <main class="w-full px-3 md:px-5 lg:px-8 py-6">
        
        <!-- Weeks Grid -->
        <div v-for="(week, weekIndex) in groupedSchedule" :key="weekIndex" class="mb-10">
            <h2 class="text-2xl md:text-3xl font-bold mb-6 text-gray-700 flex items-center border-b-4 border-indigo-200 pb-3">
                <i class="fas fa-calendar-week mr-3 text-indigo-500"></i> {{ week.title }}
            </h2>
            
            <!-- 將網格設定為 4 欄，7天會自然分成 4天 + 3天 兩排 -->
            <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-6 md:gap-8">
                <div v-for="day in week.days" :key="day.date" 
                     @click="openModal(day)"
                     class="bg-white rounded-2xl shadow-md border-t-8 overflow-hidden hover:shadow-2xl transition-all duration-300 cursor-pointer flex flex-col h-full relative"
                     :class="[
                         getDayBorderColor(day.dayOfWeek, day.date), 
                         isToday(day.date) ? 'glow-today ring-4 ring-yellow-400' : '',
                         isPast(day.date) && !isToday(day.date) ? 'grayscale opacity-50 hover:grayscale-0 hover:opacity-100 bg-gray-100' : ''
                     ]">
                    
                    <div class="bg-gray-50 px-4 py-3 border-b border-gray-100 flex justify-between items-center shrink-0">
                        <div class="font-black text-gray-800 text-2xl md:text-3xl flex items-center tracking-wide">
                            {{ day.date }} <span class="text-lg md:text-xl text-gray-500 ml-2 mr-3">({{ day.dayOfWeek }})</span>
                            <span v-if="isToday(day.date)" class="text-sm md:text-base bg-yellow-400 text-yellow-900 px-3 py-1 rounded-full animate-pulse">今日</span>
                        </div>
                        <div v-if="day.isHoliday" class="text-sm md:text-base font-bold bg-pink-100 text-pink-700 px-3 py-1 rounded-full shadow-sm">
                            旅遊/假日
                        </div>
                    </div>

                    <div class="p-3 md:p-4 space-y-3 flex-grow overflow-y-auto max-h-[450px] hide-scrollbar">
                        <div v-for="(event, eIndex) in day.events" :key="event.id" 
                             @click.stop="toggleTask(event)"
                             class="text-base md:text-lg flex flex-row p-3 rounded-xl border-2 transition-all duration-200 cursor-pointer hover:shadow-md"
                             :class="[getEventStyle(event.desc), event.completed ? 'task-completed' : '']">
                            
                            <div class="pt-1 mr-3">
                                <div class="w-6 h-6 md:w-7 md:h-7 rounded border-2 flex items-center justify-center transition-colors duration-200"
                                     :class="event.completed ? 'bg-indigo-500 border-indigo-500' : 'bg-gray-50 border-gray-300'">
                                     <i v-if="event.completed" class="fas fa-check text-white text-sm md:text-base"></i>
                                </div>
                            </div>

                            <div class="flex-grow flex flex-col select-none">
                                <div class="font-mono text-sm md:text-base font-semibold opacity-75 mb-1.5 flex items-center">
                                    <i class="far fa-clock mr-1.5"></i> {{ event.time }}
                                </div>
                                <div class="text-base md:text-xl font-bold leading-relaxed tracking-wide" v-html="formatDesc(event.desc)"></div>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <!-- 彈出式閱讀視窗 (Modal) -->
    <transition name="modal">
        <div v-if="selectedDay" class="fixed inset-0 z-50 flex items-center justify-center p-4 bg-gray-900 bg-opacity-50 backdrop-blur-sm" @click.self="closeModal">
            <div class="bg-white rounded-2xl shadow-2xl w-full max-w-2xl max-h-[90vh] flex flex-col overflow-hidden">
                
                <div class="px-6 py-4 border-b border-gray-200 flex justify-between items-center" :class="getModalHeaderColor(selectedDay)">
                    <h3 class="text-2xl font-bold text-gray-800 flex items-center">
                        <i class="fas fa-calendar-day mr-3 opacity-70"></i>
                        {{ selectedDay.date }} ({{ selectedDay.dayOfWeek }}) 詳細進度
                        <span v-if="selectedDay.isHoliday" class="ml-3 text-sm font-bold bg-pink-100 text-pink-700 px-2 py-1 rounded-full">旅遊/假日</span>
                        <span v-if="isToday(selectedDay.date)" class="ml-3 text-sm font-bold bg-yellow-400 text-yellow-900 px-2 py-1 rounded-full">✨ 就是今天</span>
                    </h3>
                    <button @click="closeModal" class="text-gray-500 hover:text-gray-800 focus:outline-none p-2 rounded-full hover:bg-white/50 transition-colors">
                        <i class="fas fa-times text-xl"></i>
                    </button>
                </div>

                <div class="p-6 overflow-y-auto flex-grow bg-gray-50 space-y-4">
                    <div v-for="(event, eIndex) in selectedDay.events" :key="event.id" 
                         @click="toggleTask(event)"
                         class="flex p-4 rounded-xl border-2 shadow-sm transition-all duration-300 hover:shadow-md cursor-pointer select-none"
                         :class="[getEventStyle(event.desc), event.completed ? 'task-completed opacity-70 scale-[0.98]' : 'bg-white hover:border-indigo-300']">
                        
                        <div class="flex items-center justify-center mr-4">
                            <div class="w-6 h-6 rounded border-2 flex items-center justify-center transition-colors duration-200"
                                 :class="event.completed ? 'bg-indigo-500 border-indigo-500' : 'bg-gray-50 border-gray-300'">
                                 <i v-if="event.completed" class="fas fa-check text-white text-sm"></i>
                            </div>
                        </div>

                        <div class="flex flex-col justify-center">
                            <div class="font-mono text-sm font-bold opacity-75 text-gray-600 mb-1 flex items-center">
                                <i class="far fa-clock text-indigo-400 mr-2"></i> {{ event.time }}
                            </div>
                            <div class="text-lg font-bold leading-relaxed" v-html="formatDesc(event.desc)"></div>
                        </div>
                    </div>
                </div>
                
                <div class="px-6 py-4 border-t border-gray-200 bg-white text-center">
                    <button @click="closeModal" class="bg-indigo-600 hover:bg-indigo-700 text-white font-bold py-2 px-8 rounded-full shadow-lg transition-transform transform hover:scale-105">
                        確認並關閉
                    </button>
                </div>
            </div>
        </div>
    </transition>
</div>

            "社會科第1~4冊 第1次模擬考", "社會科第1~4冊 第2次模擬考", "社會科第1~4冊 第3次模擬考", 
            "社會科第1~4冊 第4次模擬考", "社會科第1~4冊 第5次模擬考"
        ];

        const chiTopics = [
            "國文 單元10~12 (量詞、實虛數、一字多義)", 
            "國文 單元13~14 (特殊字義、狀聲詞)", 
            "國文 單元15~17 (敬謙詞、慣用語、一詞多義)", 
            "國文 單元18~20 (易混淆詞語、偏義複詞、常用詞語)", 
            "國文 單元21~23 (易混淆/名人/貶義成語)", 
            "國文 單元24~27 (義近成語、詞性轉換、句子的種類)", 
            "國文 單元28~30 (主語判斷、書信柬帖、啟事便條)", 
            "國文 單元31~34 (對聯題辭、節慶年齡、文學主流)", 
            "國文 單元35~37 (詩詞曲格律比較、善用修辭)", 
            "國文 單元38~40 (標點符號、冗言贅字、語病判斷)", 
            "國文 單元41~42 (寫作技巧判斷、句式邏輯)", 
            "國文 單元43~44 (雙句句義比較、俗語諺語)", 
            "國文 單元45~46 (語氣判斷、白話詩文填空)", 
            "國文 單元47~48 (文言詩文填空、白話詩文重組)", 
            "國文 單元49~51 (文言重組、文宣/圖文表單測驗)", 
            "國文 單元52~54 (圖文表題組、白話文閱讀測驗)", 
            "國文 單元55~56 (核心議題閱讀測驗)", 
            "國文 單元57~58 (17項SDGs閱讀測驗)", 
            "國文 單元59 (現代詩單題閱讀測驗)", 
            "國文 單元60~62 (現代詩題組、詩詞曲閱讀測驗)", 
            "國文 單元63 (文言文單題閱讀測驗)", 
            "國文 單元64~67 (文言文題組、雙文閱讀測驗)"
        ];

        // 將 5/25 ~ 6/18 的進度整合為 Date 字典，方便對應
        const preSummerMap = {
            "5/25": "國文 單元1(「相似詞語」的分辨)",
            "5/27": "國文 單元2(「形近字」的分辨)",
            "5/28": "國文 單元3(「音近字」的分辨)",
            "6/01": "國文 單元4(重要詞語辨正)",
            "6/03": "國文 單元1~4練習題",
            "6/04": "國文 單元5(相似字「字音」辨正)",
            "6/08": "國文 單元6(一字多音辨正)",
            "6/10": "國文 單元7(重要讀音辨正)",
            "6/11": "國文 單元6~7練習題",
            "6/15": "國文 單元8(造字法則)",
            "6/17": "國文 單元9(漢字形體的演變)",
            "6/18": "國文 單元8~9練習題"
        };

        let mI = 0, sI = 0, eI = 0, socI = 0, cI = 0, cM = 1;

        const schedule = [];
        let curr = new Date(2026, 4, 25); // 從 2026/05/25 (星期一) 開始
        const end = new Date(2026, 7, 30); // 到 2026/08/30 (星期日) 結束
        
        const dayNames = ["日", "一", "二", "三", "四", "五", "六"];

        while (curr <= end) {
            const dateStr = `${curr.getMonth() + 1}/${String(curr.getDate()).padStart(2, '0')}`;
            const dayOfWeek = curr.getDay();
            const dayName = dayNames[dayOfWeek];

            let events = [];

            if (curr < new Date(2026, 5, 29)) {
                // 5/25 ~ 6/28 期間：暖身與考後休息週
                if (preSummerMap[dateStr]) {
                    events.push({ time: "22:00-23:00", desc: preSummerMap[dateStr] });
                }
            } else {
                // 6/29 起：暑假衝刺進度
                const isFamilyTrip1 = (dateStr === "7/16");
                const isFamilyTrip2 = (dateStr === "8/06");
                const isPenghu = (dateStr === "8/22" || dateStr === "8/23" || dateStr === "8/24");

                if (isPenghu) {
                    events.push({ time: "全天", desc: "🏖️ 澎湖之旅 (暫停進度)" });
                } else if (isFamilyTrip1 || isFamilyTrip2) {
                    events.push({ time: "全天", desc: "🚗 家庭旅遊日 (暫停進度)" });
                } else {
                    if (dayOfWeek >= 1 && dayOfWeek <= 5) { // Mon - Fri
                        events.push({ time: "07:00-07:30", desc: "早餐" });
                        events.push({ time: "07:30-08:00", desc: "成語/英文單字背誦" });

                        let mathDesc = mI < mathTopics.length ? mathTopics[mI++] : `數學 (彈性複習)`;
                        events.push({ time: "08:00-10:00", desc: mathDesc });

                        let chiDesc;
                        if (curr <= new Date(2026, 7, 10)) {
                            chiDesc = cI < chiTopics.length ? chiTopics[cI++] : "國文 (彈性複習)";
                        } else {
                            chiDesc = `國文科 第${cM++}次模擬考`;
                        }
                        events.push({ time: "10:00-12:00", desc: chiDesc });

                        events.push({ time: "12:00-13:30", desc: "中餐+午睡" });

                        let sciDesc = sI < sciTopics.length ? sciTopics[sI++] : `自然 (彈性複習)`;
                        events.push({ time: "13:30-15:00", desc: sciDesc });

                        let engDesc = eI < engTopics.length ? engTopics[eI++] : `英文 (彈性複習)`;
                        events.push({ time: "15:00-17:00", desc: engDesc });

                        events.push({ time: "17:00-18:00", desc: "運動+洗澡+晚餐" });

                        if (dayOfWeek === 1 || dayOfWeek === 4) { // Mon, Thu
                            events.push({ time: "18:00-20:00", desc: "複習鍾揚理化上課內容" });
                        } else if (dayOfWeek === 2 || dayOfWeek === 3 || dayOfWeek === 5) { // Tue, Wed, Fri
                            events.push({ time: "18:00-20:00", desc: "數學家教" });
                        }
                        
                        let socDesc = socI < socTopics.length ? socTopics[socI++] : `社會 (彈性複習)`;
                        events.push({ time: "20:00-21:30", desc: socDesc });
                        
                        events.push({ time: "21:30-22:30", desc: "彈性時間" });
                    } else if (dayOfWeek === 6) { // Sat
                        events.push({ time: "07:30-08:30", desc: "早餐" });
                        events.push({ time: "08:30-10:00", desc: "英文/國文閱讀練習" });
                        events.push({ time: "10:00-12:00", desc: "英文家教" });
                        events.push({ time: "12:00-13:30", desc: "中餐+午睡" });
                        events.push({ time: "13:30-17:00", desc: "鍾揚理化補習班進度班" });
                        events.push({ time: "17:00-17:30", desc: "休息" });
                        events.push({ time: "17:30-19:00", desc: "運動+洗澡+晚餐" });
                        events.push({ time: "19:00-21:30", desc: "國文家教" });
                        events.push({ time: "21:30-22:30", desc: "彈性時間" });
                    } else if (dayOfWeek === 0) { // Sun
                        events.push({ time: "07:30-08:30", desc: "早餐" });
                        events.push({ time: "08:30-12:00", desc: "鍾揚理化補習班總複習班上課" });
                        events.push({ time: "12:00-13:30", desc: "中餐+午睡" });
                        events.push({ time: "13:30-15:00", desc: "複習國文家教上課內容" });
                        events.push({ time: "15:00-17:00", desc: "地球科學家教" });
                        events.push({ time: "17:00-19:00", desc: "外出用餐" });
                        events.push({ time: "19:00-20:30", desc: "複習鍾揚理化上課內容" });
                        events.push({ time: "20:30-21:30", desc: "複習英文家教上課內容" });
                        events.push({ time: "21:30-22:30", desc: "彈性時間" });
                    }
                }
            }

            schedule.push({ date: dateStr, day: dayName, events: events });
            curr.setDate(curr.getDate() + 1);
        }
        return schedule;
    })();

    const app = createApp({
        data() {
            // 給每個任務產生獨特的 ID，用於 Firebase 辨識與儲存
            const scheduleWithState = rawScheduleText.map(day => ({
                ...day,
                events: day.events.map(e => ({ 
                    ...e, 
                    id: `${day.date}_${e.time}`, 
                    completed: false 
                }))
            }));

            return {
                selectedDay: null, 
                scheduleData: scheduleWithState,
                userNameInput: '',
                currentUser: '',
                isLoggedIn: false,
                isLoggingIn: false,
                historicalUsers: [] 
            }
        },
        computed: {
            groupedSchedule() {
                const weeks = [];
                // 動態將排程以每7天為一組
                for(let i = 0; i < this.scheduleData.length; i += 7) {
                    const weekDays = this.scheduleData.slice(i, i + 7);
                    const weekIndex = Math.floor(i / 7);
                    let title = "";
                    
                    if (weekIndex < 4) {
                        title = `第 ${weekIndex + 1} 週 暖身週`;
                    } else if (weekIndex === 4) {
                        title = `第 5 週 考前準備與休息週`;
                    } else {
                        title = `第 ${weekIndex - 4} 週 衝刺進度`;
                    }

                    weeks.push({
                        title: title,
                        days: weekDays
                    });
                }
                
                const holidays = ["7/16", "8/06", "8/22", "8/23", "8/24"];
                weeks.forEach(w => w.days.forEach(d => {
                    d.isHoliday = d.day === '六' || d.day === '日' || holidays.includes(d.date);
                    d.dayOfWeek = d.day;
                }));
                return weeks;
            }
        },
        mounted() {
            this.initFirebase();
        },
        methods: {
            async initFirebase() {
                try {
                    const firebaseApp = initializeApp(firebaseConfig);
                    auth = getAuth(firebaseApp);
                    db = getFirestore(firebaseApp);
                    await signInAnonymously(auth);
                    
                    isFirebaseReady = true;

                    const savedHistory = localStorage.getItem('schedule_historical_users');
                    if (savedHistory) {
                        try {
                            this.historicalUsers = JSON.parse(savedHistory);
                        } catch (e) {
                            this.historicalUsers = [];
                        }
                    }

                    const savedUser = localStorage.getItem('schedule_user_name');
                    if (savedUser) {
                        this.userNameInput = savedUser;
                        this.login();
                    }
                } catch (error) {
                    console.error("Firebase 初始化失敗:", error);
                }
            },
            async login() {
                if (!this.userNameInput.trim() || !isFirebaseReady) return;
                
                this.isLoggingIn = true;
                this.currentUser = this.userNameInput.trim();
                
                try {
                    const userDocRef = doc(db, COLLECTION_NAME, `User_${this.currentUser}`);
                    const docSnap = await getDoc(userDocRef);
                    
                    if (!docSnap.exists()) {
                        await setDoc(userDocRef, { completedTasks: [] });
                        const globalRef = doc(db, COLLECTION_NAME, DOC_GLOBAL);
                        await setDoc(globalRef, { users: arrayUnion(this.currentUser) }, { merge: true });
                    }

                    if (currentUserDocUnsubscribe) currentUserDocUnsubscribe();
                    
                    currentUserDocUnsubscribe = onSnapshot(userDocRef, (doc) => {
                        const data = doc.data();
                        const completedList = data?.completedTasks || [];
                        this.syncLocalSchedule(completedList);
                    });

                    this.isLoggedIn = true;
                    localStorage.setItem('schedule_user_name', this.currentUser);

                    if (!this.historicalUsers.includes(this.currentUser)) {
                        this.historicalUsers.push(this.currentUser);
                        localStorage.setItem('schedule_historical_users', JSON.stringify(this.historicalUsers));
                    }

                } catch (error) {
                    console.error("登入儲存失敗:", error);
                    alert("登入失敗，請稍後再試。");
                } finally {
                    this.isLoggingIn = false;
                }
            },
            quickLogin(name) {
                this.userNameInput = name;
                this.login();
            },
            logout() {
                this.isLoggedIn = false;
                this.currentUser = '';
                this.userNameInput = '';
                localStorage.removeItem('schedule_user_name');
                if (currentUserDocUnsubscribe) {
                    currentUserDocUnsubscribe();
                }
                this.syncLocalSchedule([]);
            },
            syncLocalSchedule(completedList) {
                this.scheduleData.forEach(day => {
                    day.events.forEach(event => {
                        event.completed = completedList.includes(event.id);
                    });
                });
            },
            async toggleTask(event) {
                if (!this.isLoggedIn) {
                    alert('⚠️ 請先在上方輸入姓名登入，系統才能幫你儲存打勾進度喔！');
                    return;
                }

                const isNowCompleted = !event.completed;
                event.completed = isNowCompleted;

                try {
                    const userDocRef = doc(db, COLLECTION_NAME, `User_${this.currentUser}`);
                    if (isNowCompleted) {
                        await updateDoc(userDocRef, { completedTasks: arrayUnion(event.id) });
                    } else {
                        await updateDoc(userDocRef, { completedTasks: arrayRemove(event.id) });
                    }
                } catch (error) {
                    console.error("同步至雲端失敗:", error);
                    event.completed = !isNowCompleted;
                }
            },
            openModal(day) {
                this.selectedDay = day;
                document.body.style.overflow = 'hidden'; 
            },
            closeModal() {
                this.selectedDay = null;
                document.body.style.overflow = 'auto'; 
            },
            getFormattedDate(dateStr) {
                const parts = dateStr.split('/');
                const mm = parts[0].padStart(2, '0');
                const dd = parts[1].padStart(2, '0');
                return `${mm}/${dd}`;
            },
            isToday(dateStr) {
                const today = new Date();
                const mm = String(today.getMonth() + 1).padStart(2, '0');
                const dd = String(today.getDate()).padStart(2, '0');
                const formattedToday = `${mm}/${dd}`;
                const formattedCardDate = this.getFormattedDate(dateStr);
                
                return formattedCardDate === formattedToday;
            },
            isPast(dateStr) {
                const today = new Date();
                const mm = String(today.getMonth() + 1).padStart(2, '0');
                const dd = String(today.getDate()).padStart(2, '0');
                const formattedToday = `${mm}/${dd}`;
                const formattedCardDate = this.getFormattedDate(dateStr);

                if (formattedToday < '05/25') return false;
                
                return formattedCardDate < formattedToday;
            },
            getDayBorderColor(day, date) {
                const holidays = ["7/16", "8/06", "8/22", "8/23", "8/24"];
                if (day === '六' || day === '日' || holidays.includes(date)) return 'border-pink-300 bg-pink-50/20';
                return 'border-indigo-300';
            },
            getModalHeaderColor(day) {
                if(this.isToday(day.date)) return 'bg-yellow-100';
                if(day.isHoliday) return 'bg-pink-50';
                return 'bg-indigo-50';
            },
            getEventStyle(desc) {
                // 旅遊或暫停項目
                if (desc.includes('暫停') || desc.includes('延後')) return 'bg-gray-100 border-gray-200 text-gray-500';

                // 2. 成語/英文單字背誦、閱讀練習和彈性時間 -> 使用同一種專屬淺色系 (淺藍綠色)
                if (desc.includes('背誦') || desc.includes('閱讀練習') || desc.includes('彈性')) return 'bg-cyan-50 border-cyan-200 text-cyan-700';

                // 1. 所有生活作息 -> 改使用更柔和溫馨的暖色系 (玫瑰暖粉色)
                if (desc.includes('早餐') || desc.includes('中餐') || desc.includes('晚餐') || desc.includes('休息') || desc.includes('放鬆') || desc.includes('洗澡') || desc.includes('運動') || desc.includes('用餐') || desc.includes('準備') || desc.includes('午睡')) return 'bg-rose-50 border-rose-200 text-rose-700';
                
                // 相同科目的進度全部統一使用專屬顏色 (包含家教、補習班、模擬考等皆使用該科專屬色)
                if (desc.includes('數學')) return 'bg-blue-50 border-blue-200 text-blue-800';
                if (desc.includes('自然') || desc.includes('理化') || desc.includes('地球科學')) return 'bg-purple-50 border-purple-200 text-purple-800';
                if (desc.includes('英文')) return 'bg-red-50 border-red-200 text-red-800';
                if (desc.includes('國文')) return 'bg-orange-50 border-orange-200 text-orange-800';
                if (desc.includes('社會') || desc.includes('歷史') || desc.includes('地理') || desc.includes('公民')) return 'bg-green-50 border-green-200 text-green-800';
                
                return 'bg-white border-gray-200 text-gray-700'; 
            },
            formatDesc(desc) {
                // 將「模擬考」加上粗體與底線強調 (移除背景色，讓科目本身的顏色能夠主導整個區塊)
                let formatted = desc.replace(/(第[1-9]+次模擬考)/g, '<span class="font-black underline">$1</span>');
                
                // 科目名稱加粗
                formatted = formatted.replace(/(數學|理化|英文|國文|歷史|地理|公民|地科|地球科學|社會|社會科|生物|自然|自然科|文言文)/g, '<span class="font-bold">$1</span>');
                return formatted;
            }
        }
    });

    app.mount('#app');
</script>
</body>
</html>
