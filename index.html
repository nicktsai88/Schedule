                <span class="bg-purple-100 text-purple-800 px-2 py-1 rounded shadow-sm border border-purple-200">理化</span>
                <span class="bg-red-100 text-red-800 px-2 py-1 rounded shadow-sm border border-red-200">英文</span>
                <span class="bg-orange-100 text-orange-800 px-2 py-1 rounded shadow-sm border border-orange-200">國文</span>
                <span class="bg-green-100 text-green-800 px-2 py-1 rounded shadow-sm border border-green-200">社會</span>
                <span class="bg-yellow-100 text-yellow-800 px-2 py-1 rounded shadow-sm border border-yellow-200"><i class="fas fa-chalkboard-teacher mr-1"></i>家教</span>
                <span class="bg-teal-100 text-teal-800 px-2 py-1 rounded shadow-sm border border-teal-200"><i class="fas fa-brain mr-1"></i>艾賓浩斯</span>
            </div>
        </div>
    </header>

    <!-- Main Content -->
    <main class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-8">
        
        <!-- Stage Filter/Tabs (Optional visual indicator) -->
        <div class="mb-8 flex space-x-2 overflow-x-auto hide-scrollbar pb-2">
            <div v-for="(stage, index) in stages" :key="index" 
                 class="px-4 py-2 rounded-full whitespace-nowrap font-bold text-sm shadow-sm border"
                 :class="stage.colorClass">
                {{ stage.name }}
            </div>
        </div>

        <!-- Weeks Grid -->
        <div v-for="(week, weekIndex) in groupedSchedule" :key="weekIndex" class="mb-12">
            <h2 class="text-xl font-bold mb-4 text-gray-700 flex items-center border-b pb-2">
                <i class="fas fa-calendar-week mr-2 text-indigo-500"></i> {{ week.title }}
            </h2>
            <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4 gap-4">
                
                <!-- Day Card -->
                <div v-for="day in week.days" :key="day.date" 
                     class="bg-white rounded-xl shadow-md overflow-hidden hover:shadow-lg transition-shadow duration-300 border-t-4"
                     :class="getDayBorderColor(day.dayOfWeek, day.date)">
                    
                    <!-- Card Header -->
                    <div class="bg-gray-50 px-4 py-3 border-b border-gray-100 flex justify-between items-center">
                        <div class="font-bold text-gray-800 text-lg">
                            {{ day.date }} <span class="text-sm text-gray-500 ml-1">({{ day.dayOfWeek }})</span>
                        </div>
                        <div v-if="day.isHoliday" class="text-xs font-bold bg-pink-100 text-pink-700 px-2 py-1 rounded-full">
                            假日黃金期
                        </div>
                    </div>

                    <!-- Card Body (Events) -->
                    <div class="p-3 space-y-2">
                        <div v-for="(event, eIndex) in day.events" :key="eIndex" 
                             class="text-sm flex flex-col p-2 rounded border"
                             :class="getEventStyle(event.desc)">
                            <div class="font-mono text-xs font-semibold opacity-70 mb-1 flex items-center">
                                <i class="far fa-clock mr-1"></i> {{ event.time }}
                            </div>
                            <div class="font-medium leading-tight" v-html="formatDesc(event.desc)"></div>
                        </div>
                    </div>
                </div>

            </div>
        </div>
    </main>
</div>

        { date: "5/03", day: "日", events: [
            { time: "08:00-09:30", desc: "最後翻閱錯題本" },
            { time: "09:30-12:00", desc: "英文家教" },
            { time: "12:00-13:30", desc: "午餐與午休" },
            { time: "13:30-15:00", desc: "確認考具考場" },
            { time: "15:00-16:00", desc: "地科家教" },
            { time: "16:00-17:30", desc: "閉目養神，深呼吸訓練" },
            { time: "17:30-19:00", desc: "運動與晚餐" },
            { time: "19:00-21:00", desc: "洗澡準備睡覺，腦中放電影" }
        ]},
        { date: "5/04", day: "一", events: [
            { time: "18:30-21:00", desc: "考前一天。只看精華筆記、公式表。21:30 準時睡覺" }
        ]}
    ];

    createApp({
        data() {
            return {
                stages: [
                    { name: '🟡 第一階段：黃金吸收期', colorClass: 'bg-yellow-50 text-yellow-700 border-yellow-300' },
                    { name: '🔵 第二階段：大量刷題', colorClass: 'bg-blue-50 text-blue-700 border-blue-300' },
                    { name: '🔴 第三階段：考前收網', colorClass: 'bg-red-50 text-red-700 border-red-300' }
                ]
            }
        },
        computed: {
            groupedSchedule() {
                // Grouping by weeks
                const weeks = [
                    { title: "第 1 週 (啟動週)", days: rawSchedule.slice(0, 5) },
                    { title: "第 2 週 (衝刺週)", days: rawSchedule.slice(5, 12) },
                    { title: "第 3 週 (進度收尾)", days: rawSchedule.slice(12, 19) },
                    { title: "第 4 週 (狂刷題找盲點)", days: rawSchedule.slice(19, 26) },
                    { title: "第 5 週 (錯題與模擬考)", days: rawSchedule.slice(26, 33) },
                    { title: "第 6 週 (終極收網週)", days: rawSchedule.slice(33, 41) }
                ];
                
                // Add weekend flag
                const holidays = ["4/03", "4/04", "4/05", "4/06", "5/01", "5/02", "5/03"];
                weeks.forEach(w => w.days.forEach(d => {
                    d.isHoliday = d.day === '六' || d.day === '日' || holidays.includes(d.date);
                    d.dayOfWeek = d.day;
                }));
                return weeks;
            }
        },
        methods: {
            getDayBorderColor(day, date) {
                const holidays = ["4/03", "4/04", "4/05", "4/06", "5/01", "5/02", "5/03"];
                if (day === '六' || day === '日' || holidays.includes(date)) return 'border-pink-400';
                return 'border-indigo-400';
            },
            getEventStyle(desc) {
                // Logic to assign colors based on keywords in description
                if (desc.includes('數學') && !desc.includes('家教')) return 'bg-blue-50 border-blue-200 text-blue-800';
                if (desc.includes('理化') && !desc.includes('家教')) return 'bg-purple-50 border-purple-200 text-purple-800';
                if (desc.includes('英文') && !desc.includes('家教')) return 'bg-red-50 border-red-200 text-red-800';
                if (desc.includes('國文') && !desc.includes('家教')) return 'bg-orange-50 border-orange-200 text-orange-800';
                if (desc.includes('歷') || desc.includes('地') || desc.includes('公') || desc.includes('社會')) return 'bg-green-50 border-green-200 text-green-800';
                
                if (desc.includes('家教')) return 'bg-yellow-50 border-yellow-300 text-yellow-800 font-bold';
                
                if (desc.includes('R1') || desc.includes('R2') || desc.includes('R4') || desc.includes('R7') || desc.includes('R15') || desc.includes('L0')) return 'bg-teal-50 border-teal-200 text-teal-800';
                
                if (desc.includes('午餐') || desc.includes('晚餐') || desc.includes('休息') || desc.includes('放鬆') || desc.includes('睡覺') || desc.includes('運動')) return 'bg-gray-100 border-gray-200 text-gray-600 border-dashed';

                return 'bg-white border-gray-200 text-gray-700'; // default
            },
            formatDesc(desc) {
                // Bold module tags for better readability
                let formatted = desc.replace(/(L0|R1|R2|R4|R7|R15)/g, '<span class="font-bold border-b border-current pb-px">$1</span>');
                formatted = formatted.replace(/(數M\d|理M\d|英M\d|國M\d|歷M\d|地M\d|公M\d)/g, '<span class="font-bold">$1</span>');
                return formatted;
            }
        }
    }).mount('#app')
</script>
