<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🏆 決戰會考 國二升國三暑假衝刺計畫</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;700;900&display=swap');
        
        body {
            font-family: 'Noto Sans TC', sans-serif;
            background-color: #f3f4f6;
        }
        
        /* 防止 Vue 渲染前的閃爍 */
        [v-cloak] {
            display: none !important;
        }

        .hide-scrollbar::-webkit-scrollbar {
            display: none;
        }
        .hide-scrollbar {
            -ms-overflow-style: none;
            scrollbar-width: none;
        }
        
        /* 今日專屬發光外框動畫 */
        .glow-today {
            box-shadow: 0 0 20px 5px rgba(250, 204, 21, 0.6);
            border-color: #facc15 !important;
            transform: scale(1.02);
            z-index: 10;
            scroll-margin-top: 120px;
        }
        
        /* 打勾後的視覺變化 */
        .task-completed {
            opacity: 0.6;
            text-decoration: line-through;
            background-color: #f9fafb !important;
            border-color: #e5e7eb !important;
            color: #9ca3af !important;
        }
        
        /* 自定義彈出視窗動畫 */
        .modal-enter-active, .modal-leave-active {
            transition: all 0.3s ease;
        }
        .modal-enter-from, .modal-leave-to {
            opacity: 0;
            transform: scale(0.95);
        }

        /* 列印專用樣式 (A4 直式) */
        @media print {
            body {
                -webkit-print-color-adjust: exact;
                print-color-adjust: exact;
                background-color: white !important;
            }
            body * {
                visibility: hidden;
            }
            .modal-overlay-print, .modal-overlay-print * {
                visibility: visible;
            }
            .modal-overlay-print {
                position: absolute !important;
                left: 0 !important;
                top: 0 !important;
                background: transparent !important;
                backdrop-filter: none !important;
                padding: 0 !important;
                align-items: flex-start !important;
                width: 100% !important;
                height: auto !important;
            }
            .modal-print-area {
                position: relative;
                width: 100%;
                max-width: 100% !important;
                height: auto !important;
                max-height: none !important;
                overflow: visible !important;
                box-shadow: none !important;
                border: none !important;
            }
            /* 讓捲動區域在列印時完全展開 */
            .modal-print-area .overflow-y-auto {
                overflow: visible !important;
                max-height: none !important;
            }
            /* 隱藏不需要列印的元素 (如按鈕) */
            .print-hide, .print-hide * {
                display: none !important;
            }
            @page {
                size: A4 portrait;
                margin: 15mm;
            }
        }
    </style>
</head>
<body class="text-gray-800 antialiased">

<div id="app" class="min-h-screen pb-12" v-cloak>
    <!-- Header (含登入功能) -->
    <header class="bg-gradient-to-r from-blue-600 to-indigo-700 text-white shadow-lg sticky top-0 z-40">

            <div>
                <h1 class="text-2xl font-black tracking-wider flex items-center">

                </h1>
                <p class="text-blue-100 text-sm mt-1">執行期間：6/29 ～ 8/30 | <i class="fas fa-cloud text-blue-200 mx-1"></i> 進度自動雲端儲存</p>
            </div>

                            <i class="fas fa-user-circle text-xl text-yellow-300"></i>
                            <input v-model="userNameInput" @keyup.enter="login" type="text" placeholder="輸入姓名登入" class="px-3 py-1.5 text-sm text-gray-800 rounded outline-none w-32 md:w-40 focus:ring-2 focus:ring-yellow-400 font-bold transition-all">
                        </div>
                        <button @click="login" :disabled="isLoggingIn || !isFirebaseReady || !userNameInput.trim()"

                                :class="(userNameInput.trim() && isFirebaseReady && !isLoggingIn) ? 'bg-yellow-400 hover:bg-yellow-300 text-yellow-900 shadow-[0_0_15px_rgba(250,204,21,0.6)] scale-105' : 'bg-white/20 text-white/50 border border-white/20 cursor-not-allowed'">
                            <span v-if="isLoggingIn"><i class="fas fa-spinner fa-spin mr-1"></i>連線中</span>
                            <span v-else><i class="fas fa-sign-in-alt mr-1"></i>登入存檔</span>

                    </div>

                        <button v-for="user in historicalUsers" :key="user" @click="quickLogin(user)"

                            {{ user }}
                        </button>
                    </div>
                </div>
                <div v-else class="flex items-center gap-3">
                    <div class="flex items-center gap-2 bg-yellow-400 text-yellow-900 px-3 py-1 rounded-full shadow-inner font-bold text-sm">
                        <i class="fas fa-check-circle text-green-700"></i>
                        <span>{{ currentUser }}</span>
                    </div>
                    <button @click="logout" class="bg-indigo-500 hover:bg-indigo-400 text-white px-3 py-1.5 rounded font-bold text-xs shadow transition-colors whitespace-nowrap border border-indigo-400">
                        登出
                    </button>
                </div>
            </div>
        </div>
    </header>

    <!-- Main Content -->
    <main class="w-full px-3 md:px-5 lg:px-8 py-6">
        <!-- Weeks Grid -->
        <div v-for="(week, weekIndex) in groupedSchedule" :key="weekIndex" class="mb-10">
            <h2 class="text-2xl md:text-3xl font-bold mb-6 text-gray-700 flex items-center border-b-4 border-indigo-200 pb-3">
                <i class="fas fa-calendar-week mr-3 text-indigo-500"></i> {{ week.title }}
            </h2>
            
            <!-- 將網格設定為 4 欄，7天會自然分成 4天 + 3天 兩排 -->
            <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-6 md:gap-8">
                <div v-for="day in week.days" :key="day.date" 
                     @click="openModal(day)"
                     class="bg-white rounded-2xl shadow-md border-t-8 overflow-hidden hover:shadow-2xl transition-all duration-300 cursor-pointer flex flex-col h-full relative"
                     :class="[
                         getDayBorderColor(day.dayOfWeek, day.date), 
                         isToday(day.date) ? 'glow-today ring-4 ring-yellow-400' : '',
                         isPast(day.date) && !isToday(day.date) ? 'grayscale opacity-50 hover:grayscale-0 hover:opacity-100 bg-gray-100' : ''
                     ]">
                    
                    <div class="bg-gray-50 px-4 py-3 border-b border-gray-100 flex justify-between items-center shrink-0">
                        <div class="font-black text-gray-800 text-2xl md:text-3xl flex items-center tracking-wide">
                            {{ day.date }} <span class="text-lg md:text-xl text-gray-500 ml-2 mr-3">({{ day.dayOfWeek }})</span>
                            <span v-if="isToday(day.date)" class="text-sm md:text-base bg-yellow-400 text-yellow-900 px-3 py-1 rounded-full animate-pulse">今日</span>
                        </div>
                        <div v-if="day.isHoliday" class="text-sm md:text-base font-bold bg-pink-100 text-pink-700 px-3 py-1 rounded-full shadow-sm">
                            旅遊/假日
                        </div>
                    </div>

                    <!-- 固定每日任務區塊 (Card卡片預覽) -->
                    <div class="px-3 md:px-4 py-3 bg-indigo-50/50 border-b border-indigo-100 flex flex-col gap-2 shrink-0">
                        <div class="text-xs font-bold text-indigo-800 mb-1 flex items-center"><i class="fas fa-list-check mr-1.5"></i>每日固定複習</div>
                        <div class="flex flex-col gap-2">
                            <div v-for="task in day.fixedTasks" :key="task.id" 
                                 class="flex items-start space-x-2.5 cursor-pointer group"
                                 @click.stop="toggleTask(task)">
                                <div class="pt-0.5 shrink-0">
                                    <div class="w-4 h-4 rounded border flex items-center justify-center transition-colors"

                                        <i v-if="task.completed" class="fas fa-check text-[10px]"></i>

                                </div>

                                <div class="w-6 h-6 md:w-7 md:h-7 rounded border-2 flex items-center justify-center transition-colors duration-200"

                            </div>

                    <div class="grid grid-cols-1 sm:grid-cols-2 md:grid-cols-3 gap-3">
                        <div v-for="task in selectedDay.fixedTasks" :key="task.id"

                            <div class="flex items-center justify-center mr-3 shrink-0">
                                <div class="w-5 h-5 rounded flex items-center justify-center transition-colors duration-200"

                                     <i v-if="task.completed" class="fas fa-check text-xs"></i>
                                </div>
                            </div>
                            <span class="font-bold text-sm md:text-base transition-colors"
                                  :class="task.completed ? 'text-gray-500 line-through' : 'text-gray-800'">
                                {{ task.desc }}
                            </span>
                        </div>
                    </div>
                </div>

                <div class="p-6 overflow-y-auto flex-grow bg-gray-50 space-y-4">
                    <div v-for="(event, eIndex) in selectedDay.events" :key="event.id" 
                         @click="toggleTask(event)"
                         class="flex p-4 rounded-xl border-2 shadow-sm transition-all duration-300 hover:shadow-md cursor-pointer select-none"
                         :class="[getEventStyle(event.desc), event.completed ? 'task-completed opacity-70 scale-[0.98]' : 'bg-white hover:border-indigo-300']">
                        
                        <div class="flex items-center justify-center mr-4">
                            <div class="w-6 h-6 rounded border-2 flex items-center justify-center transition-colors duration-200"
                                 :class="event.completed ? 'bg-indigo-500 border-indigo-500' : 'bg-gray-50 border-gray-300'">
                                 <i v-if="event.completed" class="fas fa-check text-white text-sm"></i>
                            </div>
                        </div>

                        <div class="flex flex-col justify-center">
                            <div class="font-mono text-sm font-bold opacity-75 text-gray-600 mb-1 flex items-center">
                                <i class="far fa-clock text-indigo-400 mr-2"></i> {{ event.time }}
                            </div>
                            <div class="text-lg font-bold leading-relaxed" v-html="formatDesc(event.desc)"></div>
                        </div>
                    </div>
                </div>
                
                <div class="px-6 py-4 border-t border-gray-200 bg-white flex justify-center gap-4 print-hide">
                    <button @click="closeModal" class="bg-indigo-600 hover:bg-indigo-700 text-white font-bold py-2 px-8 rounded-full shadow-lg transition-transform transform hover:scale-105">
                        確認並關閉
                    </button>
                    <button @click="printModal" class="bg-emerald-500 hover:bg-emerald-600 text-white font-bold py-2 px-8 rounded-full shadow-lg transition-transform transform hover:scale-105 flex items-center gap-2">
                        <i class="fas fa-print"></i> 列印
                    </button>
                </div>
            </div>
        </div>
    </transition>
</div>

            "歷史 單元7 第三冊 (西力衝擊下的晚清與東亞)", "地理 會考模擬試題 1~2冊", "公民 單元6 第三冊 法治與權力分立、中央政府", 
            "歷史 單元8 第四冊 (中華民國的建立與社會變遷)", "地理 單元7 第三冊 中國的自然環境與人口", "公民 單元7 第三冊 地方政府與政治參與", 
            "歷史 單元9 第四冊 (現代國家的挑戰與變局)", "地理 單元8 第三冊 中國的產業、經濟發展與全球關聯", "公民 單元8 第四冊 民法、刑法與行政法", 
            "歷史 單元10 第四冊 (共黨政權在中國與當代東亞的局勢)", "地理 單元9 第三冊 全球氣候概述、東北亞", "公民 單元9 第四冊 權利救濟", 
            "歷史 會考模擬試題 1~4冊", "地理 單元10 第四冊 東南亞與南亞", "公民 單元10 第四冊 青少年法律", 
            "地理 單元11 第四冊 西亞與北非", "公民 會考模擬試題 1~4冊", 
            "地理 單元12 第四冊 漠南非洲", "地理 會考模擬試題 1~4冊"
        ];

        const chiTopics = [
            "國文 單元5 第二冊 (6~10課 自學課)", "國文 單元6 第二冊 (主題專區 含語文常識)", "國文 會考模擬試題 1~2冊", 
            "國文 單元7 第三冊 (1~5課)", "國文 單元8 第三冊 (6~10課 自學課)", "國文 單元9 第三冊 (主題專區 含語文常識)", 
            "國文 單元10 第四冊 (1~5課)", "國文 單元11 第四冊 (6~10課 自學課)", "國文 單元12 第四冊 (主題專區 含語文常識)", 
            "國文 會考模擬試題 1~4冊"
        ];

        let mI = 0, sI = 0, eI = 0, socI = 0, cI = 0, cM = 1;

        const schedule = [];
        let curr = new Date(2026, 5, 29); // 從 2026/06/29 開始
        const end = new Date(2026, 7, 30); // 到 2026/08/30 結束
        
        const dayNames = ["日", "一", "二", "三", "四", "五", "六"];

        while (curr <= end) {
            const dateStr = `${curr.getMonth() + 1}/${String(curr.getDate()).padStart(2, '0')}`;
            const dayOfWeek = curr.getDay();
            const dayName = dayNames[dayOfWeek];

            let events = [];

            // 7/13 起才開始真正推進各科剩餘陣列單元
            const advanceProgress = curr >= new Date(2026, 6, 13);
            const isBeforeJuly13 = curr < new Date(2026, 6, 13) && curr >= new Date(2026, 5, 30);
            
            const isFinalExam = (dateStr === "6/29");
            const isTaichung = (dateStr === "7/01" || dateStr === "7/02");
            const isFamilyTrip1 = (dateStr === "7/15");
            const isFamilyTrip2 = (dateStr === "8/05");
            const isPenghu = (dateStr === "8/22" || dateStr === "8/23" || dateStr === "8/24");

            if (isFinalExam) {
                events.push({ time: "全天", desc: "📝 學校期末考 (暫停進度)" });
            } else if (isTaichung) {
                events.push({ time: "全天", desc: "🚗 台中之旅 (暫停進度)" });
            } else if (isPenghu) {
                events.push({ time: "全天", desc: "🏖️ 澎湖之旅 (暫停進度)" });
            } else if (isFamilyTrip1 || isFamilyTrip2) {
                events.push({ time: "全天", desc: "🚗 家庭旅遊日 (暫停進度)" });
            } else {
                if (dayOfWeek >= 1 && dayOfWeek <= 5) { // Mon - Fri
                    events.push({ time: "07:00-07:30", desc: "早餐" });
                    events.push({ time: "07:30-08:00", desc: "國文/英文閱讀練習" });

                    if (dayOfWeek === 5) {
                        events.push({ time: "08:00-10:00", desc: "數學彈性時間" });
                        events.push({ time: "10:00-12:00", desc: "國文彈性時間" });
                        events.push({ time: "12:00-13:00", desc: "中餐+午睡" });
                        events.push({ time: "13:00-15:00", desc: "生物/理化彈性時間" });
                        events.push({ time: "15:00-16:30", desc: "英文彈性時間" });
                        events.push({ time: "16:30-18:00", desc: "運動+洗澡+晚餐" });
                        events.push({ time: "18:00-20:00", desc: "數學家教" });
                        
                        let socDesc1 = advanceProgress && socI < socTopics.length ? socTopics[socI++] : (isBeforeJuly13 ? "✅ 社會 (7/13前進度已達標)" : `社會 (彈性複習)`);
                        let socDesc2 = advanceProgress && socI < socTopics.length ? socTopics[socI++] : (isBeforeJuly13 ? "✅ 社會 (7/13前進度已達標)" : `社會 (彈性複習)`);
                        events.push({ time: "20:00-21:00", desc: socDesc1 });
                        events.push({ time: "21:00-22:00", desc: socDesc2 });
                        events.push({ time: "22:00-22:30", desc: "彈性時間" });
                    } else {
                        let mathDesc;
                        if (dateStr === "7/13") {
                            mathDesc = "數學麻辣講義  第3單元複習";
                        } else {
                            mathDesc = advanceProgress && mI < mathTopics.length ? mathTopics[mI++] : (isBeforeJuly13 ? "✅ 數學 (7/13前進度已達標)" : `數學 (彈性複習)`);
                        }
                        events.push({ time: "08:00-10:00", desc: mathDesc });

                        let chiDesc;
                        if (isBeforeJuly13) {
                            chiDesc = "✅ 國文 (7/13前進度已達標)";
                        } else if (curr <= new Date(2026, 7, 10)) {
                            chiDesc = advanceProgress && cI < chiTopics.length ? chiTopics[cI++] : "國文 (彈性複習)";
                        } else {
                            chiDesc = `國文科 第${cM++}次模擬考`;
                        }
                        events.push({ time: "10:00-12:00", desc: chiDesc });

                        events.push({ time: "12:00-13:00", desc: "中餐+午睡" });

                        let sciDesc = advanceProgress && sI < sciTopics.length ? sciTopics[sI++] : (isBeforeJuly13 ? "✅ 自然 (7/13前進度已達標)" : `自然 (彈性複習)`);
                        events.push({ time: "13:00-15:00", desc: sciDesc });

                        let engDesc = advanceProgress && eI < engTopics.length ? engTopics[eI++] : (isBeforeJuly13 ? "✅ 英文 (7/13前進度已達標)" : `英文 (彈性複習)`);
                        events.push({ time: "15:00-16:30", desc: engDesc });

                        events.push({ time: "16:30-18:00", desc: "運動+洗澡+晚餐" });

                        if (dayOfWeek === 1) { // Mon
                            events.push({ time: "18:00-19:30", desc: "複習鍾揚理化上課內容" });
                            events.push({ time: "19:30-22:00", desc: "數學家教" });
                            events.push({ time: "22:00-22:30", desc: "彈性時間" });
                        } else if (dayOfWeek === 2 || dayOfWeek === 3 || dayOfWeek === 4) { // Tue, Wed, Thu
                            if (dayOfWeek === 2) {
                                events.push({ time: "18:00-20:00", desc: "數學家教" });
                            } else if (dayOfWeek === 3) {
                                events.push({ time: "18:00-20:00", desc: "複習鍾揚理化上課內容" });
                            } else if (dayOfWeek === 4) {
                                events.push({ time: "18:00-20:00", desc: "歷史/地理/公民彈性時間" });
                            }
                            
                            let socDesc1 = advanceProgress && socI < socTopics.length ? socTopics[socI++] : (isBeforeJuly13 ? "✅ 社會 (7/13前進度已達標)" : `社會 (彈性複習)`);
                            let socDesc2 = advanceProgress && socI < socTopics.length ? socTopics[socI++] : (isBeforeJuly13 ? "✅ 社會 (7/13前進度已達標)" : `社會 (彈性複習)`);
                            events.push({ time: "20:00-21:00", desc: socDesc1 });
                            events.push({ time: "21:00-22:00", desc: socDesc2 });
                            events.push({ time: "22:00-22:30", desc: "彈性時間" });
                        }
                    }
                } else if (dayOfWeek === 6) { // Sat
                    events.push({ time: "07:30-08:00", desc: "早餐" });
                    events.push({ time: "08:00-09:30", desc: "英文/國文閱讀練習" });
                    events.push({ time: "09:30-12:00", desc: "英文家教" });
                    events.push({ time: "12:00-13:30", desc: "中餐+午睡" });
                    events.push({ time: "13:30-17:30", desc: "鍾揚理化補習班進度班" });
                    events.push({ time: "17:30-19:00", desc: "運動+洗澡+晚餐" });
                    events.push({ time: "19:00-21:30", desc: "吳敏男線上國文課" });
                    events.push({ time: "21:30-22:30", desc: "彈性時間" });
                } else if (dayOfWeek === 0) { // Sun
                    events.push({ time: "07:30-08:00", desc: "早餐" });
                    events.push({ time: "08:00-08:30", desc: "英文/國文閱讀練習" });
                    events.push({ time: "08:30-12:30", desc: "鍾揚理化補習班總複習班上課" });
                    events.push({ time: "12:30-14:00", desc: "中餐+午睡" });
                    events.push({ time: "14:00-15:00", desc: "彈性時間" });
                    events.push({ time: "15:00-17:00", desc: "地球科學家教" });
                    events.push({ time: "17:00-19:00", desc: "外出用餐" });
                    events.push({ time: "19:00-20:30", desc: "複習鍾揚理化上課內容" });
                    events.push({ time: "20:30-21:30", desc: "複習英文家教上課內容" });
                    events.push({ time: "21:30-22:30", desc: "彈性時間" });
                }
            }

            schedule.push({ date: dateStr, day: dayName, events: events });
            curr.setDate(curr.getDate() + 1);
        }
        return schedule;
    })();

    const app = createApp({
        data() {
            const holidays = ["7/01", "7/02", "7/15", "8/05", "8/22", "8/23", "8/24"];
            
            // 定義每天固定要複習的項目清單
            const fixedTasksTemplate = [
                "國文會考題組5篇",
                "英文會考題組5篇",
                "國文成語學習",
                "英文單字學習",
                "文言文3篇"
            ];
            
            // 給每個任務產生獨特的 ID，用於 Firebase 辨識與儲存 (解決原始程式碼在 Computed 修改物件的無窮迴圈問題)
            const scheduleWithState = rawScheduleText.map(day => ({
                ...day,
                isHoliday: day.day === '六' || day.day === '日' || holidays.includes(day.date),
                dayOfWeek: day.day,
                fixedTasks: fixedTasksTemplate.map((desc, idx) => ({
                    id: `Fixed_${day.date}_${idx}`, 
                    desc: desc, 
                    completed: false 
                })),
                events: day.events.map(e => ({ 
                    ...e, 
                    id: `${day.date}_${e.time}`, 
                    completed: false 
                }))
            }));

            return {
                selectedDay: null, 
                scheduleData: scheduleWithState,
                userNameInput: '',
                currentUser: '',
                isLoggedIn: false,
                isLoggingIn: false,
                historicalUsers: [] 
            }
        },
        computed: {
            groupedSchedule() {
                const weeks = [];
                for(let i = 0; i < this.scheduleData.length; i += 7) {
                    const weekDays = this.scheduleData.slice(i, i + 7);
                    const weekIndex = Math.floor(i / 7);
                    let title = `第 ${weekIndex + 1} 週 衝刺進度`;

                    weeks.push({
                        title: title,
                        days: weekDays
                    });
                }
                
                const holidays = GLOBAL_HOLIDAYS;
                weeks.forEach(w => w.days.forEach(d => {
                    d.isHoliday = d.day === '六' || d.day === '日' || holidays.includes(d.date);
                    d.dayOfWeek = d.day;
                }));
                return weeks;
            }
        },
        mounted() {
            this.initFirebase();
            this.scrollToToday();
        },
        methods: {
            scrollToToday() {
                this.$nextTick(() => {
                    setTimeout(() => {
                        const todayCard = document.querySelector('.glow-today');
                        if (todayCard) {
                            todayCard.scrollIntoView({ behavior: 'smooth', block: 'start' });
                        }
                    }, 500);
                });
            },
            async initFirebase() {
                try {
                    // 安全套用環境注入設定
                    if (typeof __firebase_config !== 'undefined') {
                        firebaseConfig = JSON.parse(__firebase_config);
                    }
                    if (typeof __app_id !== 'undefined') {
                        globalAppId = __app_id;
                    }

                    const firebaseApp = initializeApp(firebaseConfig);
                    auth = getAuth(firebaseApp);
                    db = getFirestore(firebaseApp);

                    if (typeof __initial_auth_token !== 'undefined' && __initial_auth_token) {
                        try {
                            await signInWithCustomToken(auth, __initial_auth_token);
                        } catch (e) {
                            await signInAnonymously(auth);
                        }
                    } else {
                        await signInAnonymously(auth);
                    }
                    
                    isFirebaseReady = true;

                    const savedHistory = localStorage.getItem('schedule_historical_users');
                    if (savedHistory) {
                        try {
                            this.historicalUsers = JSON.parse(savedHistory);
                        } catch (e) {
                            this.historicalUsers = [];
                        }
                    }

                    const savedUser = localStorage.getItem('schedule_user_name');
                    if (savedUser) {
                        this.userNameInput = savedUser;
                        this.login();
                    }
                } catch (error) {
                    console.error("Firebase 初始化失敗:", error);
                }
            },
            async login() {
                if (!this.userNameInput.trim() || !isFirebaseReady) return;
                
                this.isLoggingIn = true;
                this.currentUser = this.userNameInput.trim();
                
                try {
                    const baseCollection = collection(db, 'artifacts', globalAppId, 'public', 'data', 'ScheduleData');
                    const userDocRef = doc(baseCollection, `User_${this.currentUser}`);
                    const globalRef = doc(baseCollection, 'UserList');
                    
                    const docSnap = await getDoc(userDocRef);
                    
                    if (!docSnap.exists()) {
                        await setDoc(userDocRef, { completedTasks: [] });
                        await setDoc(globalRef, { users: arrayUnion(this.currentUser) }, { merge: true });
                    }

                    if (currentUserDocUnsubscribe) currentUserDocUnsubscribe();
                    
                    currentUserDocUnsubscribe = onSnapshot(userDocRef, (doc) => {
                        const data = doc.data();
                        const completedList = data?.completedTasks || [];
                        this.syncLocalSchedule(completedList);
                    });

                    this.isLoggedIn = true;
                    localStorage.setItem('schedule_user_name', this.currentUser);

                    if (!this.historicalUsers.includes(this.currentUser)) {
                        this.historicalUsers.push(this.currentUser);
                        localStorage.setItem('schedule_historical_users', JSON.stringify(this.historicalUsers));
                    }

                } catch (error) {
                    console.error("登入儲存失敗:", error);
                    console.warn("登入失敗，請稍後再試。"); 
                } finally {
                    this.isLoggingIn = false;
                }
            },
            quickLogin(name) {
                this.userNameInput = name;
                this.login();
            },
            logout() {
                this.isLoggedIn = false;
                this.currentUser = '';
                this.userNameInput = '';
                localStorage.removeItem('schedule_user_name');
                if (currentUserDocUnsubscribe) {
                    currentUserDocUnsubscribe();
                }
                this.syncLocalSchedule([]);
            },
            syncLocalSchedule(completedList) {
                this.scheduleData.forEach(day => {
                    day.events.forEach(event => {
                        event.completed = completedList.includes(event.id);
                    });
                    day.fixedTasks.forEach(task => {
                        task.completed = completedList.includes(task.id);
                    });
                });
            },
            async toggleTask(event) {
                if (!this.isLoggedIn) {
                    console.warn('⚠️ 請先在上方輸入姓名登入，系統才能幫你儲存打勾進度喔！');
                    return;
                }

                const isNowCompleted = !event.completed;
                event.completed = isNowCompleted;

                try {
                    const baseCollection = collection(db, 'artifacts', globalAppId, 'public', 'data', 'ScheduleData');
                    const userDocRef = doc(baseCollection, `User_${this.currentUser}`);
                    
                    if (isNowCompleted) {
                        await updateDoc(userDocRef, { completedTasks: arrayUnion(event.id) });
                    } else {
                        await updateDoc(userDocRef, { completedTasks: arrayRemove(event.id) });
                    }
                } catch (error) {
                    console.error("同步至雲端失敗:", error);
                    event.completed = !isNowCompleted;
                }
            },
            openModal(day) {
                this.selectedDay = day;
                document.body.style.overflow = 'hidden'; 
            },
            closeModal() {
                this.selectedDay = null;
                document.body.style.overflow = 'auto'; 
            },
            printModal() {
                window.print();
            },
            getFormattedDate(dateStr) {
                const parts = dateStr.split('/');
                const mm = parts[0].padStart(2, '0');
                const dd = parts[1].padStart(2, '0');
                return `${mm}/${dd}`;
            },
            isToday(dateStr) {
                const today = new Date();
                const mm = String(today.getMonth() + 1).padStart(2, '0');
                const dd = String(today.getDate()).padStart(2, '0');
                const formattedToday = `${mm}/${dd}`;
                const formattedCardDate = this.getFormattedDate(dateStr);
                
                return formattedCardDate === formattedToday;
            },
            isPast(dateStr) {
                const today = new Date();
                const mm = String(today.getMonth() + 1).padStart(2, '0');
                const dd = String(today.getDate()).padStart(2, '0');
                const formattedToday = `${mm}/${dd}`;
                const formattedCardDate = this.getFormattedDate(dateStr);

                if (formattedToday < '06/29') return false;
                
                return formattedCardDate < formattedToday;
            },
            getDayBorderColor(day, date) {
                const holidays = GLOBAL_HOLIDAYS;
                if (day === '六' || day === '日' || holidays.includes(date)) return 'border-pink-300 bg-pink-50/20';
                return 'border-indigo-300';
            },
            getModalHeaderColor(day) {
                if(this.isToday(day.date)) return 'bg-yellow-100';
                if(day.isHoliday) return 'bg-pink-50';
                return 'bg-indigo-50';
            },
            getEventStyle(desc) {
                // 旅遊或暫停項目
                if (desc.includes('暫停') || desc.includes('延後')) return 'bg-gray-100 border-gray-200 text-gray-500';

                // 嚴格比對單純的「彈性時間」，以及背誦閱讀。
                if (desc === '彈性時間' || desc.includes('背誦') || desc.includes('閱讀練習')) return 'bg-cyan-50 border-cyan-200 text-cyan-700';

                // 所有生活作息 -> 柔和溫馨的暖色系 (玫瑰暖粉色)
                if (desc.includes('早餐') || desc.includes('中餐') || desc.includes('晚餐') || desc.includes('休息') || desc.includes('放鬆') || desc.includes('洗澡') || desc.includes('運動') || desc.includes('用餐') || desc.includes('準備') || desc.includes('午睡')) return 'bg-rose-50 border-rose-200 text-rose-700';
                
                // 相同科目的進度全部統一使用專屬顏色 
                if (desc.includes('數學')) return 'bg-blue-50 border-blue-200 text-blue-800';
                if (desc.includes('自然') || desc.includes('理化') || desc.includes('地球科學') || desc.includes('生物')) return 'bg-purple-50 border-purple-200 text-purple-800';
                if (desc.includes('英文')) return 'bg-red-50 border-red-200 text-red-800';
                if (desc.includes('國文')) return 'bg-orange-50 border-orange-200 text-orange-800';
                if (desc.includes('社會') || desc.includes('歷史') || desc.includes('地理') || desc.includes('公民')) return 'bg-green-50 border-green-200 text-green-800';
                
                return 'bg-white border-gray-200 text-gray-700'; 
            },
            formatDesc(desc) {
                // 將「模擬考」加上粗體與底線強調
                let formatted = desc.replace(/(第[1-9]+次模擬考)/g, '<span class="font-black underline">$1</span>');
                
                // 已完成的標記自動調亮強調 (如 ✅ 國文 單元1)
                formatted = formatted.replace(/(✅ .*)/g, '<span class="text-emerald-600">$1</span>');

                // 科目名稱加粗
                formatted = formatted.replace(/(數學|理化|英文|國文|歷史|地理|公民|地科|地球科學|社會|社會科|生物|自然|自然科|文言文)/g, '<span class="font-bold">$1</span>');
                return formatted;
            }
        }
    });

    app.mount('#app');
</script>
