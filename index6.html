<html lang="zh-TW">
<head>

    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;700;900&display=swap');
        body {
            font-family: 'Noto Sans TC', sans-serif;
            background-color: #f3f4f6;
        }
        .hide-scrollbar::-webkit-scrollbar {
            display: none;
        }
        .hide-scrollbar {
            -ms-overflow-style: none;
            scrollbar-width: none;
        }
        /* 今日專屬發光外框動畫 */
        .glow-today {
            box-shadow: 0 0 20px 5px rgba(250, 204, 21, 0.6);
            border-color: #facc15 !important;
            transform: scale(1.02);
            z-index: 10;
        }
        /* 打勾後的視覺變化 */
        .task-completed {
            opacity: 0.6;
            text-decoration: line-through;
            background-color: #f9fafb !important;
            border-color: #e5e7eb !important;
            color: #9ca3af !important;
        }
        /* 自定義彈出視窗動畫 */
        .modal-enter-active, .modal-leave-active {
            transition: all 0.3s ease;
        }
        .modal-enter-from, .modal-leave-to {
            opacity: 0;
            transform: scale(0.95);
        }
    </style>
</head>
<body class="text-gray-800 antialiased">

<div id="app" class="min-h-screen pb-12" v-cloak>
    <!-- Header (含登入功能) -->
    <header class="bg-gradient-to-r from-blue-600 to-indigo-700 text-white shadow-lg sticky top-0 z-40">
        <div class="w-full px-4 md:px-6 py-4 flex flex-col md:flex-row justify-between items-center gap-4">
            <div>
                <h1 class="text-2xl font-black tracking-wider flex items-center">
                    <i class="fas fa-trophy text-yellow-400 mr-2"></i>道明國二下 前三名衝刺計畫
                </h1>
                <p class="text-blue-100 text-sm mt-1">執行期間：3/25 ～ 5/4 | <i class="fas fa-cloud text-blue-200 mx-1"></i> 進度自動雲端儲存</p>
            </div>
            
            <!-- 使用者登入區塊 -->
            <div class="bg-white/10 p-2 px-4 rounded-xl backdrop-blur-sm border border-white/20 flex flex-col justify-center items-center gap-2">
                <template v-if="!isLoggedIn">
                    <!-- 第一排：輸入框與登入按鈕 -->
                    <div class="flex flex-col md:flex-row items-center gap-3 w-full justify-center">
                        <div class="flex items-center gap-2">
                            <i class="fas fa-user-circle text-xl text-yellow-300"></i>
                            <input v-model="userNameInput" @keyup.enter="login" type="text" placeholder="輸入姓名登入" class="px-3 py-1.5 text-sm text-gray-800 rounded outline-none w-32 md:w-40 focus:ring-2 focus:ring-yellow-400 font-bold transition-all">
                        </div>
                        
                        <!-- 動態按鈕：輸入文字後會發光變亮 -->
                        <button @click="login" :disabled="isLoggingIn || !isFirebaseReady || !userNameInput.trim()" 
                                class="px-4 py-1.5 rounded font-bold text-sm shadow transition-all duration-300 whitespace-nowrap"
                                :class="(userNameInput.trim() && isFirebaseReady && !isLoggingIn) ? 'bg-yellow-400 hover:bg-yellow-300 text-yellow-900 shadow-[0_0_15px_rgba(250,204,21,0.6)] scale-105' : 'bg-white/20 text-white/50 border border-white/20 cursor-not-allowed'">
                            <span v-if="isLoggingIn"><i class="fas fa-spinner fa-spin mr-1"></i>連線中</span>
                            <span v-else><i class="fas fa-sign-in-alt mr-1"></i>登入存檔</span>
                        </button>
                    </div>

                    <!-- 第二排：快速登入名單 (只要有歷史紀錄就顯示) -->
                    <div v-if="historicalUsers.length > 0" class="flex flex-wrap items-center justify-center gap-2 mt-1 pt-2 border-t border-white/10 w-full">
                        <span class="text-white/80 text-xs font-bold"><i class="fas fa-bolt text-yellow-400 mr-1"></i>快速登入:</span>
                        <button v-for="user in historicalUsers" :key="user" @click="quickLogin(user)" 
                                class="text-xs bg-white/20 hover:bg-white/40 text-white px-3 py-1 rounded-full transition-colors border border-white/30 shadow-sm">
                            {{ user }}
                        </button>
                    </div>
                </template>
                <template v-else>
                    <div class="flex items-center gap-3">
                        <div class="flex items-center gap-2 bg-yellow-400 text-yellow-900 px-3 py-1 rounded-full shadow-inner font-bold text-sm">
                            <i class="fas fa-check-circle text-green-700"></i>
                            <span>{{ currentUser }}</span>
                        </div>
                        <button @click="logout" class="bg-indigo-500 hover:bg-indigo-400 text-white px-3 py-1.5 rounded font-bold text-xs shadow transition-colors whitespace-nowrap border border-indigo-400">
                            登出
                        </button>
                    </div>
                </template>
            </div>
        </div>
    </header>

    <!-- Main Content -->
    <main class="w-full px-3 md:px-5 lg:px-8 py-6">
        
        <!-- Weeks Grid -->
        <div v-for="(week, weekIndex) in groupedSchedule" :key="weekIndex" class="mb-10">
            <h2 class="text-xl font-bold mb-4 text-gray-700 flex items-center border-b-2 border-indigo-200 pb-2">
                <i class="fas fa-calendar-week mr-2 text-indigo-500"></i> {{ week.title }}
            </h2>
            
            <!-- 日期卡片 -->
            <div class="grid grid-cols-1 md:grid-cols-3 lg:grid-cols-4 xl:grid-cols-5 gap-4">
                <div v-for="day in week.days" :key="day.date" 
                     @click="openModal(day)"
                     class="bg-white rounded-xl shadow border-t-4 overflow-hidden hover:shadow-xl transition-all duration-300 cursor-pointer flex flex-col h-full relative"
                     :class="[
                         getDayBorderColor(day.dayOfWeek, day.date), 
                         isToday(day.date) ? 'glow-today ring-4 ring-yellow-400' : '',
                         isPast(day.date) && !isToday(day.date) ? 'grayscale opacity-50 hover:grayscale-0 hover:opacity-100 bg-gray-100' : ''
                     ]">
                    
                    <!-- Card Header -->
                    <div class="bg-gray-50 px-3 py-2 border-b border-gray-100 flex justify-between items-center shrink-0">
                        <div class="font-bold text-gray-800 text-lg flex items-center">
                            {{ day.date }} <span class="text-sm text-gray-500 ml-1 mr-2">({{ day.dayOfWeek }})</span>
                            <span v-if="isToday(day.date)" class="text-xs bg-yellow-400 text-yellow-900 px-2 py-0.5 rounded-full animate-pulse">今日</span>
                        </div>
                        <div v-if="day.isHoliday" class="text-xs font-bold bg-pink-100 text-pink-700 px-2 py-1 rounded-full shadow-sm">
                            假日黃金期
                        </div>
                    </div>

                    <!-- Card Body (Events) -->
                    <div class="p-2 space-y-2 flex-grow overflow-y-auto max-h-[300px] hide-scrollbar">
                        <div v-for="(event, eIndex) in day.events" :key="event.id" 
                             @click.stop="toggleTask(event)"
                             class="text-sm flex flex-row p-2 rounded border transition-all duration-200 cursor-pointer hover:shadow-sm"
                             :class="[getEventStyle(event.desc), event.completed ? 'task-completed' : '']">
                            
                            <!-- Checkbox -->
                            <div class="pt-0.5 mr-2">
                                <div class="w-5 h-5 rounded border flex items-center justify-center transition-colors duration-200"
                                     :class="event.completed ? 'bg-indigo-500 border-indigo-500' : 'bg-gray-50 border-gray-300'">
                                     <i v-if="event.completed" class="fas fa-check text-white text-xs"></i>
                                </div>
                            </div>

                            <div class="flex-grow flex flex-col select-none">
                                <div class="font-mono text-xs font-semibold opacity-70 mb-1 flex items-center">
                                    <i class="far fa-clock mr-1"></i> {{ event.time }}
                                </div>
                                <div class="font-medium leading-relaxed tracking-wide" v-html="formatDesc(event.desc)"></div>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <!-- 彈出式閱讀視窗 (Modal) -->
    <transition name="modal">
        <div v-if="selectedDay" class="fixed inset-0 z-50 flex items-center justify-center p-4 bg-gray-900 bg-opacity-50 backdrop-blur-sm" @click.self="closeModal">
            <div class="bg-white rounded-2xl shadow-2xl w-full max-w-2xl max-h-[90vh] flex flex-col overflow-hidden">
                
                <!-- Modal Header -->
                <div class="px-6 py-4 border-b border-gray-200 flex justify-between items-center" :class="getModalHeaderColor(selectedDay)">
                    <h3 class="text-2xl font-bold text-gray-800 flex items-center">
                        <i class="fas fa-calendar-day mr-3 opacity-70"></i>
                        {{ selectedDay.date }} ({{ selectedDay.dayOfWeek }}) 詳細進度
                        <span v-if="selectedDay.isHoliday" class="ml-3 text-sm font-bold bg-pink-100 text-pink-700 px-2 py-1 rounded-full">假日黃金期</span>
                        <span v-if="isToday(selectedDay.date)" class="ml-3 text-sm font-bold bg-yellow-400 text-yellow-900 px-2 py-1 rounded-full">✨ 就是今天</span>
                    </h3>
                    <button @click="closeModal" class="text-gray-500 hover:text-gray-800 focus:outline-none p-2 rounded-full hover:bg-white/50 transition-colors">
                        <i class="fas fa-times text-xl"></i>
                    </button>
                </div>

                <!-- Modal Body -->
                <div class="p-6 overflow-y-auto flex-grow bg-gray-50 space-y-4">
                    <div v-for="(event, eIndex) in selectedDay.events" :key="event.id" 
                         @click="toggleTask(event)"
                         class="flex p-4 rounded-xl border-2 shadow-sm transition-all duration-300 hover:shadow-md cursor-pointer select-none"
                         :class="[getEventStyle(event.desc), event.completed ? 'task-completed opacity-70 scale-[0.98]' : 'bg-white hover:border-indigo-300']">
                        
                        <!-- Checkbox 放大版 -->
                        <div class="flex items-center justify-center mr-4">
                            <div class="w-6 h-6 rounded border-2 flex items-center justify-center transition-colors duration-200"
                                 :class="event.completed ? 'bg-indigo-500 border-indigo-500' : 'bg-gray-50 border-gray-300'">
                                 <i v-if="event.completed" class="fas fa-check text-white text-sm"></i>
                            </div>
                        </div>

                        <div class="flex flex-col justify-center">
                            <div class="font-mono text-sm font-bold opacity-75 text-gray-600 mb-1 flex items-center">
                                <i class="far fa-clock text-indigo-400 mr-2"></i> {{ event.time }}
                            </div>
                            <div class="text-lg font-bold leading-relaxed" v-html="formatDesc(event.desc)"></div>
                        </div>
                    </div>
                </div>
                
                <!-- Modal Footer -->
                <div class="px-6 py-4 border-t border-gray-200 bg-white text-center">
                    <button @click="closeModal" class="bg-indigo-600 hover:bg-indigo-700 text-white font-bold py-2 px-8 rounded-full shadow-lg transition-transform transform hover:scale-105">
                        確認並關閉
                    </button>
                </div>
            </div>
        </div>
    </transition>
</div>

    const app = createApp({
        data() {
            // 給每個任務產生獨特的 ID，用於 Firebase 辨識與儲存
            const scheduleWithState = rawScheduleText.map(day => ({
                ...day,
                events: day.events.map(e => ({ 
                    ...e, 
                    id: `${day.date}_${e.time}`, 
                    completed: false 
                }))
            }));

            return {
                selectedDay: null, 
                scheduleData: scheduleWithState,
                userNameInput: '',
                currentUser: '',
                isLoggedIn: false,
                isLoggingIn: false,
                historicalUsers: [] // 新增：儲存曾登入過的歷史使用者
            }
        },
        computed: {
            groupedSchedule() {
                const weeks = [
                    { title: "第 1 週 (啟動週)", days: this.scheduleData.slice(0, 5) },
                    { title: "第 2 週 (衝刺週)", days: this.scheduleData.slice(5, 12) },
                    { title: "第 3 週 (進度收尾)", days: this.scheduleData.slice(12, 19) },
                    { title: "第 4 週 (狂刷題找盲點)", days: this.scheduleData.slice(19, 26) },
                    { title: "第 5 週 (錯題與模擬考)", days: this.scheduleData.slice(26, 33) },
                    { title: "第 6 週 (終極收網週)", days: this.scheduleData.slice(33, 41) }
                ];
                
                const holidays = ["4/03", "4/04", "4/05", "4/06", "5/01", "5/02", "5/03"];
                weeks.forEach(w => w.days.forEach(d => {
                    d.isHoliday = d.day === '六' || d.day === '日' || holidays.includes(d.date);
                    d.dayOfWeek = d.day;
                }));
                return weeks;
            }
        },
        mounted() {
            this.initFirebase();
        },
        methods: {
            async initFirebase() {
                try {
                    const firebaseApp = initializeApp(firebaseConfig);
                    auth = getAuth(firebaseApp);
                    db = getFirestore(firebaseApp);
                    await signInAnonymously(auth);
                    
                    isFirebaseReady = true;

                    // 讀取歷史登入名單
                    const savedHistory = localStorage.getItem('schedule_historical_users');
                    if (savedHistory) {
                        try {
                            this.historicalUsers = JSON.parse(savedHistory);
                        } catch (e) {
                            this.historicalUsers = [];
                        }
                    }

                    // 檢查 LocalStorage 是否已經有存過最後一次登入的名字
                    const savedUser = localStorage.getItem('schedule_user_name');
                    if (savedUser) {
                        this.userNameInput = savedUser;
                        this.login();
                    }
                } catch (error) {
                    console.error("Firebase 初始化失敗:", error);
                    alert("連線資料庫失敗，請檢查網路連線。");
                }
            },
            async login() {
                if (!this.userNameInput.trim() || !isFirebaseReady) return;
                
                this.isLoggingIn = true;
                this.currentUser = this.userNameInput.trim();
                
                try {
                    const userDocRef = doc(db, COLLECTION_NAME, `User_${this.currentUser}`);
                    const docSnap = await getDoc(userDocRef);
                    
                    // 如果這個使用者是第一次登入，就在雲端建立他的檔案
                    if (!docSnap.exists()) {
                        await setDoc(userDocRef, { completedTasks: [] });
                        
                        // 順便把名字加進全域清單
                        const globalRef = doc(db, COLLECTION_NAME, DOC_GLOBAL);
                        await setDoc(globalRef, { users: arrayUnion(this.currentUser) }, { merge: true });
                    }

                    // 啟動監聽：只要雲端有變化，就即時更新到畫面上
                    if (currentUserDocUnsubscribe) currentUserDocUnsubscribe();
                    
                    currentUserDocUnsubscribe = onSnapshot(userDocRef, (doc) => {
                        const data = doc.data();
                        const completedList = data?.completedTasks || [];
                        this.syncLocalSchedule(completedList);
                    });

                    this.isLoggedIn = true;
                    localStorage.setItem('schedule_user_name', this.currentUser);

                    // 將名字加入快速登入的歷史名單中
                    if (!this.historicalUsers.includes(this.currentUser)) {
                        this.historicalUsers.push(this.currentUser);
                        localStorage.setItem('schedule_historical_users', JSON.stringify(this.historicalUsers));
                    }

                } catch (error) {
                    console.error("登入儲存失敗:", error);
                    alert("登入失敗，請稍後再試。");
                } finally {
                    this.isLoggingIn = false;
                }
            },
            quickLogin(name) {
                // 快速登入功能
                this.userNameInput = name;
                this.login();
            },
            logout() {
                this.isLoggedIn = false;
                this.currentUser = '';
                this.userNameInput = '';
                localStorage.removeItem('schedule_user_name');
                if (currentUserDocUnsubscribe) {
                    currentUserDocUnsubscribe();
                }
                // 登出後清空畫面上的打勾紀錄
                this.syncLocalSchedule([]);
            },
            syncLocalSchedule(completedList) {
                // 將雲端拉下來的打勾清單，更新到現有排程卡片中
                this.scheduleData.forEach(day => {
                    day.events.forEach(event => {
                        event.completed = completedList.includes(event.id);
                    });
                });
            },
            async toggleTask(event) {
                // 防呆：如果沒登入就不能打勾
                if (!this.isLoggedIn) {
                    alert('⚠️ 請先在上方輸入姓名登入，系統才能幫你儲存打勾進度喔！');
                    return;
                }

                // 為了讓使用者感覺反應很快，先在畫面上切換打勾狀態 (Optimistic Update)
                const isNowCompleted = !event.completed;
                event.completed = isNowCompleted;

                // 接著背景自動傳送到 Firebase 儲存
                try {
                    const userDocRef = doc(db, COLLECTION_NAME, `User_${this.currentUser}`);
                    if (isNowCompleted) {
                        await updateDoc(userDocRef, { completedTasks: arrayUnion(event.id) });
                    } else {
                        await updateDoc(userDocRef, { completedTasks: arrayRemove(event.id) });
                    }
                } catch (error) {
                    console.error("同步至雲端失敗:", error);
                    // 如果傳送失敗，就把畫面上的打勾退回原狀
                    event.completed = !isNowCompleted;
                }
            },
            openModal(day) {
                this.selectedDay = day;
                document.body.style.overflow = 'hidden'; 
            },
            closeModal() {
                this.selectedDay = null;
                document.body.style.overflow = 'auto'; 
            },
            getFormattedDate(dateStr) {
                const parts = dateStr.split('/');
                const mm = parts[0].padStart(2, '0');
                const dd = parts[1].padStart(2, '0');
                return `${mm}/${dd}`;
            },
            isToday(dateStr) {
                const today = new Date();
                const mm = String(today.getMonth() + 1).padStart(2, '0');
                const dd = String(today.getDate()).padStart(2, '0');
                const formattedToday = `${mm}/${dd}`;
                const formattedCardDate = this.getFormattedDate(dateStr);
                
                return formattedCardDate === formattedToday;
            },
            isPast(dateStr) {
                const today = new Date();
                const mm = String(today.getMonth() + 1).padStart(2, '0');
                const dd = String(today.getDate()).padStart(2, '0');
                const formattedToday = `${mm}/${dd}`;
                const formattedCardDate = this.getFormattedDate(dateStr);

                if (formattedToday < '03/25') return false;
                
                return formattedCardDate < formattedToday;
            },
            getDayBorderColor(day, date) {
                const holidays = ["4/03", "4/04", "4/05", "4/06", "5/01", "5/02", "5/03"];
                if (day === '六' || day === '日' || holidays.includes(date)) return 'border-pink-300 bg-pink-50/20';
                return 'border-indigo-300';
            },
            getModalHeaderColor(day) {
                if(this.isToday(day.date)) return 'bg-yellow-100';
                if(day.isHoliday) return 'bg-pink-50';
                return 'bg-indigo-50';
            },
            getEventStyle(desc) {
                if (desc.includes('數學') && !desc.includes('家教')) return 'bg-blue-50 border-blue-200 text-blue-800';
                if (desc.includes('理化') && !desc.includes('家教')) return 'bg-purple-50 border-purple-200 text-purple-800';
                if (desc.includes('英文') && !desc.includes('家教')) return 'bg-red-50 border-red-200 text-red-800';
                if (desc.includes('國文') && !desc.includes('家教')) return 'bg-orange-50 border-orange-200 text-orange-800';
                if (desc.includes('歷史') || desc.includes('地理') || desc.includes('公民') || desc.includes('社會')) return 'bg-green-50 border-green-200 text-green-800';
                
                if (desc.includes('家教')) return 'bg-yellow-50 border-yellow-300 text-yellow-800 font-bold';
                
                if (desc.includes('R1') || desc.includes('R2') || desc.includes('R4') || desc.includes('R7') || desc.includes('R15') || desc.includes('L0')) return 'bg-teal-50 border-teal-200 text-teal-900';
                
                if (desc.includes('午餐') || desc.includes('晚餐') || desc.includes('休息') || desc.includes('放鬆') || desc.includes('睡覺') || desc.includes('運動') || desc.includes('平靜心情')) return 'bg-gray-100 border-gray-200 text-gray-500 border-dashed';

                return 'bg-white border-gray-200 text-gray-700'; 
            },
            formatDesc(desc) {
                let formatted = desc.replace(/(L0|R15|R1|R2|R4|R7)/g, '<span class="font-black text-indigo-700 bg-indigo-100 px-1 rounded">$1</span>');
                formatted = formatted.replace(/(數學|理化|英文|國文|歷史|地理|公民)/g, '<span class="font-bold">$1</span>');
                return formatted;
            }
        }
    });

    // 啟動 Vue
    app.mount('#app');
</script>
</body>
</html>
